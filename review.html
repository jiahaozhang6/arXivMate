<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>arXiv 复盘库</title>
    <link rel="stylesheet" href="review.css">
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <p>arXivMate</p>
          <h1 data-i18n="reviewLibrary">论文复盘库</h1>
        </div>
        <div class="actions">
          <button id="export" data-i18n="exportMarkdown">导出 Markdown</button>
          <button id="export-visible" class="secondary" data-i18n="copyVisible">导出当前筛选</button>
          <a href="options.html" data-i18n="settings">设置</a>
        </div>
      </header>

      <div id="update-banner" class="update-banner" hidden></div>

      <section class="stats" aria-label="Review stats">
        <article>
          <strong id="stat-papers">0</strong>
          <span data-i18n="statsPapers">论文</span>
        </article>
        <article>
          <strong id="stat-turns">0</strong>
          <span data-i18n="statsTurns">对话轮数</span>
        </article>
        <article>
          <strong id="stat-subjects">0</strong>
          <span data-i18n="statsSubjects">研究方向</span>
        </article>
        <article>
          <strong id="stat-saved">0</strong>
          <span data-i18n="statsSaved">手动保存</span>
        </article>
      </section>

      <section class="toolbar" aria-label="Review filters">
        <div class="search-row">
          <input id="search" placeholder="搜索标题、作者、分类或总结" data-i18n-placeholder="searchPlaceholder">
          <select id="subject-filter" aria-label="Subject filter"></select>
        </div>
        <div class="filter-row">
          <label>
            <span data-i18n="filterLabel">筛选</span>
            <select id="view-filter">
              <option value="all" data-i18n="allItems">全部</option>
              <option value="favorites" data-i18n="favorites">收藏</option>
              <option value="archived" data-i18n="archived">归档</option>
              <option value="notes" data-i18n="withNotes">有笔记</option>
              <option value="chats" data-i18n="withChats">有对话</option>
            </select>
          </label>
          <label>
            <span data-i18n="sortLabel">排序</span>
            <select id="sort-mode">
              <option value="recent" data-i18n="sortRecent">最近更新</option>
              <option value="oldest" data-i18n="sortOldest">最早更新</option>
              <option value="title" data-i18n="sortTitle">标题</option>
            </select>
          </label>
        </div>
        <span id="count"></span>
      </section>

      <section id="notes" class="notes"></section>
    </main>
    <script src="i18n.js"></script>
    <script src="update-banner.js"></script>
    <script src="review.js"></script>
  </body>
</html>
